<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>O'FAME LEGACY - {% if item %}Edit{% else %}Add{% endif %} Item</title>
  <meta property="og:title" content="Admin — Edit Item" />
  <meta property="og:description" content="Edit or add menu items for O'FAME Farm Feed & Foodstuffs." />
  <meta property="og:image" content="/images/UQGQ6407.JPG" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="page">
    <header class="site-header">
      <div class="header-brand">
        <a href="/">
          <img class="site-logo" src="/images/UQGQ6407.JPG" alt="O'FAME Farm Feed logo" />
        </a>
        <div>
          <h1>O'FAME Farm Feed & Foodstuffs</h1>
          <p class="site-tagline">Farm feed, foodstuffs, and livestock in one trusted marketplace.</p>
        </div>
      </div>
      <nav>
        <a href="/admin/menu">Back</a>
      </nav>
    </header>

    <section class="checkout">
      <form method="POST">
        <div class="form-group">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" value="{{ item.name if item else '' }}" required />
        </div>
        <div class="form-group">
          <label for="price">Price</label>
          <input id="price" name="price" type="number" step="0.01" value="{{ item.price if item else '' }}" required />
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <input id="category" name="category" type="text" value="{{ item.category if item else '' }}" placeholder="Pizza, Burgers, Desserts" />
        </div>
        <div class="form-group">
          <label for="image_url">Image URL</label>
          <input id="image_url" name="image_url" type="text" value="{{ item.image_url if item else '' }}" placeholder="Optional image URL" />
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <input id="description" name="description" type="text" value="{{ item.description if item else '' }}" />
        </div>
        <button type="submit">Save</button>
      </form>
    </section>
  </div>
</body>
</html>
