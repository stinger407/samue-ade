<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>O'FAME LEGACY - Admin Users</title>
  <meta property="og:title" content="Admin — Users" />
  <meta property="og:description" content="Manage registered users for O'FAME Farm Feed & Foodstuffs." />
  <meta property="og:image" content="/images/UQGQ6407.JPG" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="page">
    <header class="site-header">
      <div class="header-brand">
        <a href="/">
          <img class="site-logo" src="/images/UQGQ6407.JPG" alt="O'FAME Farm Feed logo" />
        </a>
        <div>
          <h1>O'FAME Farm Feed & Foodstuffs</h1>
          <p class="site-tagline">Farm feed, foodstuffs, and livestock in one trusted marketplace.</p>
        </div>
      </div>
      <nav>
        <a href="/admin/menu">Menu</a>
        <a href="/admin/orders">Orders</a>
        <a href="/admin/logout">Sign Out</a>
      </nav>
    </header>

    <section class="order-history">
      <form method="GET" action="/admin/users" class="admin-search-form">
        <input type="text" name="q" value="{{ q }}" placeholder="Search users by name or email" />
        <button type="submit">Search</button>
      </form>
      {% if users %}
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            {% for user in users %}
              <tr>
                <td>{{ user.id }}</td>
                <td>{{ user.name }}</td>
                <td>{{ user.email }}</td>
                <td>
                  <a href="/admin/users/edit/{{ user.id }}">Edit</a>
                  <form action="/admin/users/delete/{{ user.id }}" method="POST" style="display:inline">
                    <button type="submit" class="ghost">Delete</button>
                  </form>
                </td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      {% else %}
        <p>No users found yet.</p>
      {% endif %}
    </section>
  </div>
</body>
</html>
