<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>O'FAME LEGACY - Edit User</title>
  <meta property="og:title" content="Admin — Edit User" />
  <meta property="og:description" content="Edit user details for O'FAME Farm Feed & Foodstuffs." />
  <meta property="og:image" content="/images/UQGQ6407.JPG" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="page">
    <header class="site-header">
      <div class="header-brand">
        <a href="/">
          <img class="site-logo" src="/images/UQGQ6407.JPG" alt="O'FAME Farm Feed logo" />
        </a>
        <div>
          <h1>O'FAME Farm Feed & Foodstuffs</h1>
          <p class="site-tagline">Farm feed, foodstuffs, and livestock in one trusted marketplace.</p>
        </div>
      </div>
      <nav>
        <a href="/admin/users">Back</a>
        <a href="/admin/menu">Menu</a>
      </nav>
    </header>

    <section class="checkout">
      <form method="POST">
        <div class="form-group">
          <label for="name">Name</label>
          <input id="name" type="text" name="name" value="{{ user.name }}" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" name="email" value="{{ user.email }}" required />
        </div>
        <button type="submit">Save User</button>
      </form>
    </section>
  </div>
</body>
</html>
