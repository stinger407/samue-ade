<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>O'FAME LEGACY - Admin Sign In</title>
    <meta property="og:title" content="Admin Login — O'FAME Farm Feed & Foodstuffs" />
    <meta property="og:description" content="Admin sign in to manage menu, users, and orders." />
    <meta property="og:image" content="/images/UQGQ6407.JPG" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="page">
    <header class="site-header">
      <div class="header-brand">
        <a href="/">
          <img class="site-logo" src="/images/UQGQ6407.JPG" alt="O'FAME Farm Feed logo" />
        </a>
        <div>
          <h1>O'FAME Farm Feed & Foodstuffs</h1>
          <p class="site-tagline">Farm feed, foodstuffs, and livestock in one trusted marketplace.</p>
        </div>
      </div>
      <nav>
        <a href="/">Menu</a>
      </nav>
    </header>

    <section class="checkout">
      <form method="POST" action="/admin/login">
        <div class="form-group">
          <label for="password">Admin Password</label>
          <input id="password" type="password" name="password" required />
        </div>
        <button type="submit">Sign In</button>
      </form>
    </section>
  </div>
</body>
</html>
